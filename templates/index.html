<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maybyte Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', filename='dist/output.css') }}" rel="stylesheet">
</head>

<body class="bg-white text-white min-h-screen font-sans antialiased">
    <div class="p-4 sm:p-6 lg:p-8 max-w-6xl mx-auto">

        <!-- header -->
        <header class="mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-extrabold text-emerald-400 tracking-tight border-gray-800 rounded-full">Maybyte</h1>
                <p class="text-[11px] text-gray-600 mt-0.5" id="mode">Detect OS...</p>
            </div>
            <div class="text-xs font-semibold text-gray-500 bg-gray-900 px-3 py-1.5 rounded-full border border-gray-800" id="status-msg">
                initialize....
            </div>
        </header>

        <!-- bento grid -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 auto-rows-auto">

            <!-- cpu load-->
            <div class="bento-card col-span-2 row-span-2 p-6 flex flex-col justify-between">
                <div>
                    <h2 class="card-label">CPU Load</h2>
                    <div class="flex items-end gap-1.5 mt-3">
                        <span class="text-7xl font-extrabold text-white tracking-tighter leading-none" id="cpu-val">0</span>
                        <span class="text-2xl font-bold text-emerald-500 mb-1.5">%</span>
                    </div>
                    <div class="mt-4 w-full bg-gray-800 rounded-full h-2 overflow-hidden">
                        <div class="h-full rounded-full bg-emerald-500 transition-all duration-500 ease-out" id="cpu-bar" style="width: 0%"></div>
                    </div>
                </div>
                <p class="text-xs text-gray-500 mt-4" id="cpu-msg">Waiting...</p>
            </div>

            <!-- cores-->
            <div class="bento-card p-5 flex flex-col justify-center items-center text-center">
                <span class="card-label">Cores</span>
                <span class="text-3xl font-extrabold text-blue-400 mt-2" id="core-val">-</span>
            </div>

            <!-- thread -->
            <div class="bento-card p-5 flex flex-col justify-center items-center text-center">
                <span class="card-label">Threads</span>
                <span class="text-3xl font-extrabold text-purple-400 mt-2" id="thread-val">-</span>
            </div>

            <!-- status -->
            <div class="bento-card col-span-2 p-5 flex items-center gap-4">
                <div class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse shrink-0"></div>
                <div>
                    <span class="card-label">System Status</span>
                    <p class="text-sm font-semibold text-white mt-1" id="cpu-status-msg">Monitoring...</p>
                </div>
            </div>

            <!-- ram -->
            <div class="bento-card col-span-2 p-5">
                <h2 class="card-label">Memory (RAM)</h2>
                <div class="flex items-end gap-1.5 mt-3">
                    <span class="text-5xl font-extrabold text-white tracking-tighter leading-none" id="ram-val">0</span>
                    <span class="text-lg font-bold text-blue-500 mb-1">%</span>
                </div>
                <div class="mt-3 w-full bg-gray-800 rounded-full h-1.5 overflow-hidden">
                    <div class="h-full rounded-full bg-blue-500 transition-all duration-500 ease-out" id="ram-bar" style="width: 0%"></div>
                </div>
                <div class="mt-4 grid grid-cols-3 gap-3 text-xs text-gray-400">
                    <div>
                        <span class="block text-gray-600 mb-0.5">Used</span>
                        <span class="text-white font-semibold" id="ram-used">-</span>
                    </div>
                    <div>
                        <span class="block text-gray-600 mb-0.5">Available</span>
                        <span class="text-emerald-400 font-semibold" id="ram-available">-</span>
                    </div>
                    <div>
                        <span class="block text-gray-600 mb-0.5">Total</span>
                        <span class="font-semibold" id="ram-total">-</span>
                    </div>
                </div>
            </div>

            <!-- storage -->
            <div class="bento-card col-span-2 p-5">
                <h2 class="card-label">Storage</h2>
                <div class="flex items-end gap-1.5 mt-3">
                    <span class="text-5xl font-extrabold text-white tracking-tighter leading-none" id="disk-val">0</span>
                    <span class="text-lg font-bold text-purple-500 mb-1">%</span>
                </div>
                <div class="mt-3 w-full bg-gray-800 rounded-full h-1.5 overflow-hidden">
                    <div class="h-full rounded-full bg-purple-500 transition-all duration-500 ease-out" id="disk-bar" style="width: 0%"></div>
                </div>
                <div class="mt-4 grid grid-cols-3 gap-3 text-xs text-gray-400">
                    <div>
                        <span class="block text-gray-600 mb-0.5">Used</span>
                        <span class="text-white font-semibold" id="disk-used">-</span>
                    </div>
                    <div>
                        <span class="block text-gray-600 mb-0.5">Available</span>
                        <span class="text-emerald-400 font-semibold" id="disk-available">-</span>
                    </div>
                    <div>
                        <span class="block text-gray-600 mb-0.5">Total</span>
                        <span class="font-semibold" id="disk-total">-</span>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script type="module" src="{{ url_for('static', filename='js/index.js') }}"></script>
</body>
</html>
